schema_version: 1

context:
  name: google-genai
  version: "2.12.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/google_genai-${{ version }}.tar.gz
  sha256: 78c25217885d63dc430ca7c4526853512b164a25a93a8a0d0af5b85971aa1db0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - wheel
    - pip
    - twine >=6.1.0
  run:
    - python >=${{ python_min }}
    - anyio >=4.8.0,<5.0.0
    - google-auth >=2.48.1,<2.56.0
    - httpx >=0.28.1,<1.0.0
    - pydantic >=2.12.5,<3.0.0
    - requests >=2.28.1,<3.0.0
    - tenacity >=8.2.3,<9.2.0
    - websockets >=13.0.0,<17.0
    - typing_extensions >=4.14.0,<5.0.0
    - sniffio
    - distro >=1.7.0,<2
tests:
  - python:
      imports:
        - google.genai
        - google.genai.types
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: GenAI Python SDK
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/googleapis/python-genai

extra:
  recipe-maintainers:
    - hadim
